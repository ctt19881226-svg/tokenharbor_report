name: Token Harbor Daily Founder Report

on:
  schedule:
    # 08:05 Asia/Shanghai = 00:05 UTC
    - cron: "5 0 * * *"
  workflow_dispatch:
    inputs:
      report_date:
        description: "Report date (YYYY-MM-DD). Leave blank for yesterday (UTC)."
        required: false
        default: ""

jobs:
  daily-report:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run daily report pipeline
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          ANTHROPIC_DEFAULT_SONNET_MODEL: ${{ secrets.ANTHROPIC_DEFAULT_SONNET_MODEL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          REPORT_FROM: ${{ secrets.REPORT_FROM }}
          REPORT_TO: ${{ secrets.REPORT_TO }}
          # GA4 — reserved for v2
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          GA4_SERVICE_ACCOUNT_JSON: ${{ secrets.GA4_SERVICE_ACCOUNT_JSON }}
        run: |
          DATE_ARG="${{ github.event.inputs.report_date }}"
          if [ -n "$DATE_ARG" ]; then
            node scripts/run_daily.mjs "$DATE_ARG"
          else
            node scripts/run_daily.mjs
          fi

      - name: Determine report date for artifact name
        id: report_date
        run: |
          DATE_ARG="${{ github.event.inputs.report_date }}"
          if [ -n "$DATE_ARG" ]; then
            echo "date=$DATE_ARG" >> "$GITHUB_OUTPUT"
          else
            echo "date=$(date -u -d 'yesterday' '+%Y-%m-%d')" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload report artifacts
        uses: actions/upload-artifact@v4
        with:
          name: daily-report-${{ steps.report_date.outputs.date }}
          path: |
            reports/daily/${{ steps.report_date.outputs.date }}/daily_report.md
            reports/daily/${{ steps.report_date.outputs.date }}/executive_summary.txt
            reports/daily/${{ steps.report_date.outputs.date }}/daily_metrics.json
            reports/daily/${{ steps.report_date.outputs.date }}/daily_metrics.csv
            reports/founder_metrics.csv
          retention-days: 90
          if-no-files-found: warn
          overwrite: true
